name: Push Digest To Site

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-digest-to-site
  cancel-in-progress: false

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      #- name: Setup Python
        #uses: actions/setup-python@v5
       # with:
         # python-version: "3.12"

      - name: Build latest digest data
        env:
          WOS_API_KEY: ${{ secrets.WOS_API_KEY }}
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          SCOPUS_INST_TOKEN: ${{ secrets.SCOPUS_INST_TOKEN }}
          IEEE_API_KEY: ${{ secrets.IEEE_API_KEY }}
          SPRINGER_API_KEY: ${{ secrets.SPRINGER_API_KEY }}
        run: |
          python -m src.digest_pipeline --config config/sources.yaml --lookback-hours 24 --max-items 10 --output-json web/data/latest_digest.json --output-markdown web/data/latest_digest.md

      - name: Commit and push if changed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain web/data/latest_digest.json web/data/latest_digest.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add web/data/latest_digest.json web/data/latest_digest.md
            git commit -m "chore: update latest digest data"
            git push
          else
            echo "No digest data changes."
          fi
